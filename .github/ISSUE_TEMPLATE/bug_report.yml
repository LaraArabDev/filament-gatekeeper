name: Bug Report
description: Report a bug or unexpected behavior in FilamentGatekeeper
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below as completely as possible.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm before submitting.
      options:
        - label: I have searched existing issues and this bug has not been reported yet.
          required: true
        - label: I have read the [documentation](https://github.com/laraarabdev/filament-gatekeeper#readme).
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: When I do X, Y happens instead of Z...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Install the package with `composer require laraarabdev/filament-gatekeeper`
        2. Configure '...'
        3. Navigate to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include any error messages or stack traces.
      render: text
    validations:
      required: true

  - type: dropdown
    id: php_version
    attributes:
      label: PHP Version
      options:
        - "8.2"
        - "8.3"
        - "8.4"
    validations:
      required: true

  - type: dropdown
    id: laravel_version
    attributes:
      label: Laravel Version
      options:
        - "10.x"
        - "11.x"
        - "12.x"
    validations:
      required: true

  - type: dropdown
    id: filament_version
    attributes:
      label: Filament Version
      options:
        - "3.x"
    validations:
      required: true

  - type: input
    id: package_version
    attributes:
      label: FilamentGatekeeper Version
      description: Run `composer show laraarabdev/filament-gatekeeper` to find the version.
      placeholder: "e.g. 1.2.0"
    validations:
      required: true

  - type: input
    id: spatie_version
    attributes:
      label: Spatie Laravel Permission Version
      description: Run `composer show spatie/laravel-permission` to find the version.
      placeholder: "e.g. 6.x"
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: Relevant Configuration
      description: Share any relevant configuration (gatekeeper.php, filament panel setup). Remove sensitive data.
      render: php
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information that may help.
    validations:
      required: false

name: Feature Request
description: Suggest a new feature or enhancement for FilamentGatekeeper
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a new feature! Please fill out the form below to help us understand your idea.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues and this feature has not been requested yet.
          required: true
        - label: I have checked the [documentation](https://github.com/laraarabdev/filament-gatekeeper#readme) to confirm this feature does not already exist.
          required: true

  - type: dropdown
    id: feature_type
    attributes:
      label: Feature Type
      description: What kind of improvement is this?
      options:
        - New Feature
        - Enhancement to Existing Feature
        - Performance Improvement
        - Developer Experience / API Improvement
        - Documentation
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: Is your feature request related to a problem? Describe the context and why this feature is needed.
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like and how it should work.
    validations:
      required: true

  - type: textarea
    id: api
    attributes:
      label: Suggested API / Usage Example
      description: If applicable, show how you imagine using the feature in code.
      render: php
      placeholder: |
        // Example usage
        Gatekeeper::someNewMethod()
            ->withOption(true)
            ->apply();
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or workarounds you've already tried.
    validations:
      required: false

  - type: dropdown
    id: willing_to_pr
    attributes:
      label: Are you willing to submit a PR?
      options:
        - "Yes, I'd like to implement this"
        - "Yes, with some guidance"
        - "No, I'm just suggesting"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, mockups, or references that might help.
    validations:
      required: false
